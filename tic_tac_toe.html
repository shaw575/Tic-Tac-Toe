<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #box {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            justify-content: center;
            gap: 0;
        }

        .border {
            width: 100px;
            height: 100px;
            margin: 0;
            padding: 0;
            border: 1px solid black;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle {
            width: 90px;
            height: 90px;
            border: 3px solid black;
            border-radius: 50%;
            box-sizing: border-box;
        }

        .x {
            font-size: 72px;
            line-height: 1;
        }
    </style>
    <title>Tic Tac Toe</title>
</head>

<body>
    <div id="box">
        <button id="1" class="border"></button>
        <button id="2" class="border"></button>
        <button id="3" class="border"></button>
        <button id="4" class="border"></button>
        <button id="5" class="border"></button>
        <button id="6" class="border"></button>
        <button id="7" class="border"></button>
        <button id="8" class="border"></button>
        <button id="9" class="border"></button>
        <p id="w"></p>
    </div>
    <script>
        const b = [
            document.getElementById("1"),
            document.getElementById("2"),
            document.getElementById("3"),
            document.getElementById("4"),
            document.getElementById("5"),
            document.getElementById("6"),
            document.getElementById("7"),
            document.getElementById("8"),
            document.getElementById("9"),
        ];
        let p = [[0, 0, 0], [0, 0, 0], [0, 0, 0]], game_over = false;
        let point_col, point_row, is_line = false;
        function test_winning() {
            for (let i = 0; i < 3; i++) {
                if (p[0][i] != 0 && p[0][i] == p[1][i] && p[1][i] == p[2][i]) {
                    if (p[0][i] == 1) document.getElementById("w").textContent = "You win";
                    else if (p[0][i] == 2) document.getElementById("w").textContent = "You lose";
                    game_over = true;
                    return;
                }
                if (p[i][0] != 0 && p[i][0] == p[i][1] && p[i][1] == p[i][2]) {
                    if (p[i][0] == 1) document.getElementById("w").textContent = "You win";
                    else if (p[i][0] == 2) document.getElementById("w").textContent = "You lose";
                    game_over = true;
                    return;
                }
            }
            if (p[1][1] != 0 && (p[0][0] == p[1][1] && p[1][1] == p[2][2]) || (p[0][2] == p[1][1] && p[1][1] == p[2][0])) {
                if (p[1][1] == 1) document.getElementById("w").textContent = "You win";
                else if (p[1][1] == 2) document.getElementById("w").textContent = "You lose";
                game_over = true;
                return;
            }
        }
        function com_show() {
            com();
            b[point_row * 3 + point_col].innerHTML = '<span class="x">x</span>';
            p[point_row][point_col] = 2;
            console.log(p);
        }
        function com() {
            is_line = false;
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 2; j++) {
                    if (p[i][j] == p[i][j + 1] && p[i][2 - j * 2] == 0 && p[i][j] != 0) {
                        point_row = i;
                        point_col = 2 - j * 2;
                        is_line = true;
                        if (p[i][j] == 2) return;
                    }
                    if (p[j][i] == p[j + 1][i] && p[2 - j * 2][i] == 0 && p[j][i] != 0) {
                        point_col = i;
                        point_row = 2 - j * 2;
                        is_line = true;
                        if (p[j][i] == 2) return;
                    }
                    if (p[j][j] == p[j + 1][j + 1] && p[2 - j * 2][2 - j * 2] == 0 && p[j][j] != 0) {
                        point_col = 2 - j * 2;
                        point_row = 2 - j * 2;
                        is_line = true;
                        if (p[j][j] == 2) return;
                    }
                    if (p[2 - j][j] == p[1 - j][j + 1] && p[j * 2][2 - j * 2] == 0 && p[2 - j][j] != 0) {
                        point_row = j * 2;
                        point_col = 2 - j * 2;
                        is_line = true;
                        if (p[2 - j][j] == 2) return;
                    }
                }
                if (p[i][0] == p[i][2] && p[i][1] == 0 && p[i][0] != 0) {
                    point_col = 1;
                    point_row = i;
                    is_line = true;
                    if (p[i][0] == 2) return;
                }
                if (p[0][i] == p[2][i] && p[1][i] == 0 && p[0][i] != 0) {
                    point_col = i;
                    point_row = 1;
                    is_line = true;
                    if (p[0][i] == 2) return;
                }
            }
            if (p[0][0] == p[2][2] && p[1][1] == 0 && p[0][0] != 0) {
                point_col = 1;
                point_row = 1;
                is_line = true;
                if (p[0][0] == 2) return;
            }
            if (p[2][0] == p[0][2] && p[1][1] == 0 && p[2][0] != 0) {
                point_col = 1;
                point_row = 1;
                is_line = true;
                if (p[2][0] == 2) return;
            }
            if (!is_line) {
                let emptyIn = [];
                for (let j = 0; j < 9; j++) if (b[j].innerHTML.trim() === "") emptyIn.push(j);
                if (emptyIn.length > 0) {
                    let rand = Math.floor(Math.random() * emptyIn.length);
                    point_row = Math.floor(emptyIn[rand] / 3);
                    point_col = emptyIn[rand] % 3;
                }
            }

        }
        for (let i = 0; i < 9; i++) {
            b[i].onclick = function () {
                if (this.innerHTML.trim() === "") {
                    this.innerHTML = '<span class="circle"></span>';
                    p[Math.floor(i / 3)][i % 3] = 1;
                    test_winning();
                    if (game_over) return;
                    com_show();
                    test_winning();
                    if (game_over) return;
                }
            }
        }


    </script>
</body>
</html>
